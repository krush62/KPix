name: KPix WinGet Publish

# Submits the Windows installer of a published GitHub release to the
# Windows Package Manager Community Repository (microsoft/winget-pkgs).
#
# Runs automatically when a release is published (drafts and pre-releases
# are ignored) and can also be triggered manually for an already published
# release.
#
# Requires a repository secret WINGET_TOKEN: a classic GitHub personal
# access token with the "public_repo" AND "workflow" scopes. wingetcreate
# uses it to push a branch to the krush62/winget-pkgs fork and open the
# pull request against microsoft/winget-pkgs. The "workflow" scope is
# needed because syncing the fork updates .github/workflows files that
# changed upstream - GitHub rejects such pushes without it.
#
# Before submitting, the fork's master branch is reset to upstream
# microsoft/winget-pkgs master. wingetcreate can only fast-forward the fork
# and fails if it has diverged. The fork's master is a pure mirror (all PRs
# are made from separate branches), so discarding stray commits is safe.

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: "Version of an already published release (e.g. 0.9.7)"
        required: true
        type: string

permissions:
  contents: read

env:
  PACKAGE_ID: krush62.KPix

jobs:
  winget:
    name: Submit manifest to winget-pkgs
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Determine version and installer URL
        id: info
        shell: pwsh
        env:
          RAW_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
        run: |
          $version = $env:RAW_VERSION.Trim() -replace '^v'
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Host "::error::Could not determine the release version."
            exit 1
          }
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/v$version/KPix-windows-installer-v$version.exe"
          "version=$version" >> $env:GITHUB_OUTPUT
          "installer_url=$installerUrl" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "Installer: $installerUrl"

      - name: Check that the installer is downloadable
        shell: pwsh
        env:
          INSTALLER_URL: ${{ steps.info.outputs.installer_url }}
        run: |
          try {
            Invoke-WebRequest -Uri $env:INSTALLER_URL -Method Head | Out-Null
            Write-Host "Installer asset found."
          } catch {
            Write-Host "::error::Installer not downloadable at $env:INSTALLER_URL - make sure the release is published (not a draft) and contains the Windows installer."
            exit 1
          }

      - name: Sync winget-pkgs fork with upstream
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          FORK_REPO: ${{ github.repository_owner }}/winget-pkgs
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            Write-Host "::error::The WINGET_TOKEN secret is not set. Create a classic GitHub PAT with the 'public_repo' and 'workflow' scopes and add it as a repository secret named WINGET_TOKEN."
            exit 1
          }
          $headers = @{
            Authorization = "Bearer $env:WINGET_TOKEN"
            Accept        = "application/vnd.github+json"
          }
          try {
            # Preflight: the token must be a CLASSIC PAT (fine-grained tokens
            # cannot write to the fork and fail with misleading 404 errors).
            # Classic tokens report their scopes in the X-OAuth-Scopes header.
            $user = Invoke-WebRequest -Uri "https://api.github.com/user" -Headers $headers
            $scopes = @($user.Headers['X-OAuth-Scopes']) -join ','
            $scopeList = $scopes -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            $hasRepo = ($scopeList -contains 'repo') -or ($scopeList -contains 'public_repo')
            $hasWorkflow = $scopeList -contains 'workflow'
            if ($scopeList.Count -eq 0) {
              Write-Host "::error::WINGET_TOKEN reports no OAuth scopes, so it appears to be a fine-grained token. Create a CLASSIC personal access token with the 'public_repo' and 'workflow' scopes and update the WINGET_TOKEN secret."
              exit 1
            }
            if (-not $hasRepo -or -not $hasWorkflow) {
              Write-Host "::error::WINGET_TOKEN is missing required scopes. It has: [$scopes]. Required: 'public_repo' (or 'repo') and 'workflow'. Edit the token's scopes or create a new classic token, then update the WINGET_TOKEN secret."
              exit 1
            }
            Write-Host "Token OK (classic PAT with scopes: $scopes)."

            $upstream = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/winget-pkgs/git/ref/heads/master" -Headers $headers
            $fork = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:FORK_REPO/git/ref/heads/master" -Headers $headers
            if ($fork.object.sha -eq $upstream.object.sha) {
              Write-Host "Fork master is already in sync with upstream."
            } else {
              # Hard-reset: the fork's master carries no unique work, and
              # wingetcreate refuses to submit when the fork has diverged.
              $body = @{ sha = $upstream.object.sha; force = $true } | ConvertTo-Json
              Invoke-RestMethod -Method Patch -Uri "https://api.github.com/repos/$env:FORK_REPO/git/refs/heads/master" -Headers $headers -Body $body | Out-Null
              Write-Host "Fork master reset to upstream commit $($upstream.object.sha)."
            }
          } catch {
            $detail = $_.ErrorDetails.Message
            Write-Host "::error::Failed to sync $env:FORK_REPO with microsoft/winget-pkgs: $($_.Exception.Message) $detail (404 on write usually means the token cannot push to the fork - it must be a classic PAT with the 'public_repo' and 'workflow' scopes.)"
            exit 1
          }

      - name: Update manifest and submit pull request
        shell: pwsh
        env:
          VERSION: ${{ steps.info.outputs.version }}
          INSTALLER_URL: ${{ steps.info.outputs.installer_url }}
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update $env:PACKAGE_ID `
            --version $env:VERSION `
            --urls "$($env:INSTALLER_URL)|x64|inno|user" `
            --submit
          exit $LASTEXITCODE
